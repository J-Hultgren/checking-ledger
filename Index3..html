<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Checking Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{background:#F9F3EE;overscroll-behavior:none;font-family:'Lato',sans-serif}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:0}
input[type=date]{-webkit-appearance:none;colorScheme:light}
.fade{animation:fu .25s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const SB=window.supabase.createClient(
  "https://irmtvjxlntozigbqxhvm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlybXR2anhsbnRvemlnYnF4aHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTkzMTQsImV4cCI6MjA5MjQzNTMxNH0.nyIZx7Z0GnHEIlZpBlN6TzHHsf7tGuhdvWECdpcQ-a0"
);

const fmtD=v=>{
  if(v===null||v===undefined||v==="")return"—";
  const n=parseFloat(v);
  if(isNaN(n))return"—";
  return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n);
};
const fmtDate=iso=>{
  if(!iso)return"";
  const d=new Date(iso+"T12:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
};
const todayISO=()=>new Date().toISOString().split("T")[0];
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS_LONG=["January","February","March","April","May","June","July","August","September","October","November","December"];

// Supabase key separate from budget planner
async function dbGet(k){const{data,error}=await SB.from("budget_data").select("*").eq("id","ledger-"+k).single();return(error||!data)?null:data;}
async function dbSet(k,val){await SB.from("budget_data").upsert({id:"ledger-"+k,month:0,year:0,income:0,budgets:val,actuals:{},updated_at:new Date().toISOString()});}

// Preset transaction descriptions for quick entry
const PRESETS=[
  "TP Paycheck","XE Paycheck","Mortgage Draft","Avant","SoFi","Upstart","Upgrade",
  "Best Egg","Affirm","Citi AA","Citi","Barclay","Amex","Dance","SCU Equity",
  "Google Fi","Fidium + Netflix","YouTube Premium","Hulu","LFOD","EZ Pass Reload",
  "Arlo Security","Trading","Tax Savings","House","Investing",
];

// Colors
const T={
  bg:"linear-gradient(145deg,#F9F3EE 0%,#F2EAE1 40%,#EDE3DA 100%)",
  card:"rgba(255,255,255,0.82)",
  border:"rgba(255,255,255,0.92)",
  text:"#3D2E26",sub:"#967060",lt:"#B09080",
  blush:"#C9907A",sage:"#7A9A80",mist:"#9A7890",
  danger:"#C05040",ok:"#4A8A5A",
  div:"rgba(201,144,122,0.12)",
  lc:"#C9907A",    // LC = blush
  scu:"#7A9A80",   // SCU = sage
};

function App(){
  const now=new Date();
  const [tab,setTab]=useState("ledger");
  const [sync,setSync]=useState("idle");
  const [loading,setLoad]=useState(true);
  const tmr=useRef({});

  // Account starting balances
  const [lcStart,setLcStart]=useState(3385);
  const [scuStart,setScuStart]=useState(1522.99);

  // All transactions sorted by date then entry order
  const [txns,setTxns]=useState([]);

  // New transaction form
  const [form,setForm]=useState({date:todayISO(),desc:"",amount:"",account:"lc",note:""});
  const [showForm,setShowForm]=useState(false);
  const [descFilter,setDescFilter]=useState("");
  const [acctFilter,setAcctFilter]=useState("all");
  const [editId,setEditId]=useState(null);

  useEffect(()=>{load();},[]);

  async function load(){
    setLoad(true);
    try{
      const[tR,sR]=await Promise.all([dbGet("txns"),dbGet("settings")]);
      if(tR?.budgets?.txns)setTxns(tR.budgets.txns);
      if(sR?.budgets){
        if(sR.budgets.lcStart!==undefined)setLcStart(sR.budgets.lcStart);
        if(sR.budgets.scuStart!==undefined)setScuStart(sR.budgets.scuStart);
      }
    }catch(e){console.error(e);}
    setLoad(false);
  }

  function sv(k,fn){
    clearTimeout(tmr.current[k]);
    tmr.current[k]=setTimeout(async()=>{
      setSync("saving");
      try{await fn();setSync("saved");setTimeout(()=>setSync("idle"),2500);}
      catch{setSync("error");}
    },600);
  }

  function saveTxns(t){sv("t",()=>dbSet("txns",{txns:t}));}
  function saveSettings(lc,scu){sv("s",()=>dbSet("settings",{lcStart:lc,scuStart:scu}));}

  function onAddTxn(){
    if(!form.desc||!form.amount||!form.date)return;
    const id=Date.now().toString();
    const t=[...txns,{id,date:form.date,desc:form.desc,amount:parseFloat(form.amount)||0,account:form.account,note:form.note}];
    t.sort((a,b)=>a.date===b.date?0:a.date<b.date?-1:1);
    setTxns(t);saveTxns(t);
    setForm({date:form.date,desc:"",amount:"",account:form.account,note:""});
    setShowForm(false);
  }

  function onDelTxn(id){
    if(!confirm("Delete this transaction?"))return;
    const t=txns.filter(x=>x.id!==id);
    setTxns(t);saveTxns(t);
  }

  function onEditSave(txn){
    const t=txns.map(x=>x.id===txn.id?txn:x);
    t.sort((a,b)=>a.date===b.date?0:a.date<b.date?-1:1);
    setTxns(t);saveTxns(t);setEditId(null);
  }

  function onStartChange(acct,val){
    const v=parseFloat(val)||0;
    if(acct==="lc"){setLcStart(v);saveSettings(v,scuStart);}
    else{setScuStart(v);saveSettings(lcStart,v);}
  }

  // Compute running balances for all txns
  const withBalances=useMemo(()=>{
    let lc=lcStart, scu=scuStart;
    return txns.map(t=>{
      if(t.account==="lc")lc=Math.round((lc+t.amount)*100)/100;
      else scu=Math.round((scu+t.amount)*100)/100;
      return{...t,lcBal:t.account==="lc"?lc:null,scuBal:t.account==="scu"?scu:null,lcRunning:lc,scuRunning:scu};
    });
  },[txns,lcStart,scuStart]);

  const lastLc=withBalances.length>0?withBalances[withBalances.length-1].lcRunning:lcStart;
  const lastScu=withBalances.length>0?withBalances[withBalances.length-1].scuRunning:scuStart;

  const filtered=useMemo(()=>{
    let rows=withBalances;
    if(acctFilter!=="all")rows=rows.filter(t=>t.account===acctFilter);
    if(descFilter)rows=rows.filter(t=>t.desc.toLowerCase().includes(descFilter.toLowerCase()));
    return rows;
  },[withBalances,acctFilter,descFilter]);

  const sl={idle:"",saving:"Saving…",saved:"✓ Synced",error:"⚠ Error"}[sync];
  const sc={idle:"transparent",saving:T.blush,saved:T.sage,error:T.danger}[sync];

  // Today's date string
  const todayStr=`${DAYS[now.getDay()]}, ${MONTHS_LONG[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  const TABS=[{id:"ledger",lbl:"📒 Ledger",},{id:"settings",lbl:"⚙️ Settings"}];

  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,overflowX:"hidden",paddingBottom:24}}>
      <div style={{position:"fixed",top:-80,right:-80,width:280,height:280,borderRadius:"60% 40% 70% 30%/50% 60% 40% 50%",background:"radial-gradient(circle,rgba(222,188,181,.28) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(255,255,255,0.92)",backdropFilter:"blur(14px)",borderBottom:`1px solid ${T.div}`,padding:"14px 18px 10px"}}>
        {/* Date */}
        <div style={{fontSize:11,color:T.blush,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:700,marginBottom:3}}>{todayStr}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.text,lineHeight:1.1}}>Checking Ledger</div>
            <div style={{fontSize:11,color:T.lt,marginTop:2}}>Running balance tracker</div>
          </div>
          <div style={{fontSize:11,color:sc,textAlign:"right",minWidth:64}}>{sl}</div>
        </div>

        {/* Account balances */}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          {[{lbl:"LC Checking",bal:lastLc,col:T.lc},{lbl:"SCU Checking",bal:lastScu,col:T.scu},{lbl:"Combined",bal:lastLc+lastScu,col:T.mist}].map((a,i)=>(
            <div key={i} style={{flex:1,background:a.col+"12",borderRadius:12,padding:"8px 10px",border:`1.5px solid ${a.col}25`}}>
              <div style={{fontSize:9,color:T.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{a.lbl}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:a.col}}>{fmtD(a.bal)}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:6,marginTop:10}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${tab===t.id?T.blush+"50":T.div}`,background:tab===t.id?`${T.blush}14`:"transparent",fontSize:12,fontWeight:tab===t.id?700:400,color:tab===t.id?T.blush:T.lt,cursor:"pointer"}}>
              {t.lbl}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:560,margin:"0 auto",padding:"14px 14px 0",position:"relative",zIndex:1}}>
        {loading
          ?<div style={{textAlign:"center",padding:60,color:T.lt,fontFamily:"'Cormorant Garamond',serif",fontSize:24}}>Loading…</div>
          :tab==="ledger"
          ?<Ledger {...{T,filtered,withBalances,txns,form,setForm,showForm,setShowForm,onAddTxn,onDelTxn,onEditSave,editId,setEditId,descFilter,setDescFilter,acctFilter,setAcctFilter,lcStart,scuStart}}/>
          :<Settings {...{T,lcStart,scuStart,onStartChange}}/>
        }
      </div>
    </div>
  );
}

// ── ADD TRANSACTION FORM ─────────────────────────────────────────
function TxnForm({T,form,setForm,onSubmit,onCancel,title="Add Transaction"}){
  const [showPresets,setShowPresets]=useState(false);
  const isPos=parseFloat(form.amount)>0;
  return(
    <div style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"16px",border:`1px solid ${T.border}`,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:T.text,marginBottom:14}}>{title}</div>

      {/* Date + Account row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{fontSize:10,color:T.lt,marginBottom:3}}>Date</div>
          <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
            style={{width:"100%",padding:"8px 10px",borderRadius:10,border:`1.5px solid ${T.blush}30`,background:`${T.blush}08`,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div>
          <div style={{fontSize:10,color:T.lt,marginBottom:3}}>Account</div>
          <div style={{display:"flex",gap:4}}>
            {[{v:"lc",lbl:"LC",col:T.lc},{v:"scu",lbl:"SCU",col:T.scu}].map(a=>(
              <button key={a.v} onClick={()=>setForm(f=>({...f,account:a.v}))}
                style={{flex:1,padding:"8px 4px",borderRadius:9,border:`1.5px solid ${a.col}${form.account===a.v?"55":"20"}`,background:form.account===a.v?`${a.col}18`:"transparent",fontSize:12,fontWeight:form.account===a.v?700:400,color:a.col,cursor:"pointer"}}>
                {a.lbl}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Description */}
      <div style={{marginBottom:8}}>
        <div style={{fontSize:10,color:T.lt,marginBottom:3}}>Description</div>
        <input value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}
          onFocus={()=>setShowPresets(true)}
          placeholder="e.g. TP Paycheck, Mortgage Draft…"
          style={{width:"100%",padding:"8px 10px",borderRadius:10,border:`1.5px solid ${T.blush}30`,background:`${T.blush}08`,fontSize:13,color:T.text,outline:"none",boxSizing:"border-box"}}/>
        {showPresets&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>
            {PRESETS.filter(p=>!form.desc||p.toLowerCase().includes(form.desc.toLowerCase())).slice(0,12).map(p=>(
              <button key={p} onClick={()=>{setForm(f=>({...f,desc:p}));setShowPresets(false);}}
                style={{padding:"3px 10px",borderRadius:99,border:`1px solid ${T.blush}30`,background:`${T.blush}09`,fontSize:11,color:T.sub,cursor:"pointer"}}>
                {p}
              </button>
            ))}
            <button onClick={()=>setShowPresets(false)} style={{padding:"3px 8px",borderRadius:99,border:`1px solid ${T.div}`,background:"transparent",fontSize:10,color:T.lt,cursor:"pointer"}}>✕</button>
          </div>
        )}
      </div>

      {/* Amount */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,color:T.lt,marginBottom:3}}>
          Amount <span style={{color:T.lt,fontWeight:400}}>(use − for withdrawals/payments, + for deposits)</span>
        </div>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:16,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,color:isPos?T.sage:T.danger}}>$</span>
          <input type="number" step="0.01" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
            placeholder="0.00"
            style={{width:"100%",padding:"9px 10px 9px 26px",borderRadius:10,border:`1.5px solid ${isPos?T.sage:T.danger}30`,background:isPos?`${T.sage}08`:`${T.danger}06`,fontSize:18,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,color:isPos?T.sage:T.danger,outline:"none",boxSizing:"border-box"}}/>
        </div>
        {/* Quick sign toggle */}
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <button onClick={()=>setForm(f=>({...f,amount:Math.abs(parseFloat(f.amount)||0)*-1||""}))}
            style={{flex:1,padding:"5px",borderRadius:8,border:`1px solid ${T.danger}30`,background:`${T.danger}08`,fontSize:11,color:T.danger,cursor:"pointer",fontWeight:600}}>− Withdrawal / Payment</button>
          <button onClick={()=>setForm(f=>({...f,amount:Math.abs(parseFloat(f.amount)||0)||""}))}
            style={{flex:1,padding:"5px",borderRadius:8,border:`1px solid ${T.sage}30`,background:`${T.sage}08`,fontSize:11,color:T.sage,cursor:"pointer",fontWeight:600}}>+ Deposit / Income</button>
        </div>
      </div>

      {/* Note */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:T.lt,marginBottom:3}}>Note (optional)</div>
        <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}
          placeholder="Optional note…"
          style={{width:"100%",padding:"7px 10px",borderRadius:10,border:`1.5px solid ${T.div}`,background:"rgba(255,255,255,0.5)",fontSize:12,color:T.text,outline:"none",boxSizing:"border-box"}}/>
      </div>

      <div style={{display:"flex",gap:8}}>
        <button onClick={onSubmit} style={{flex:1,padding:"10px",borderRadius:11,background:`linear-gradient(135deg,${T.blush}22,${T.blush}0C)`,border:`1.5px solid ${T.blush}45`,fontSize:13,fontWeight:700,color:T.blush,cursor:"pointer"}}>
          Save Transaction
        </button>
        <button onClick={onCancel} style={{padding:"10px 16px",borderRadius:11,border:`1px solid ${T.div}`,background:"transparent",fontSize:13,color:T.lt,cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  );
}

// ── LEDGER PAGE ──────────────────────────────────────────────────
function Ledger({T,filtered,withBalances,txns,form,setForm,showForm,setShowForm,onAddTxn,onDelTxn,onEditSave,editId,setEditId,descFilter,setDescFilter,acctFilter,setAcctFilter,lcStart,scuStart}){
  const [editForm,setEditForm]=useState(null);

  function startEdit(txn){
    setEditId(txn.id);
    setEditForm({...txn,amount:txn.amount});
  }

  // Group transactions by month
  const grouped=useMemo(()=>{
    const map={};
    filtered.forEach(t=>{
      const key=t.date?t.date.slice(0,7):"unknown";
      if(!map[key])map[key]=[];
      map[key].push(t);
    });
    return Object.entries(map).sort(([a],[b])=>a<b?1:-1); // newest first
  },[filtered]);

  return(
    <div className="fade">
      {/* Add button */}
      {!showForm&&(
        <button onClick={()=>setShowForm(true)}
          style={{width:"100%",marginBottom:12,padding:"12px",borderRadius:14,background:`${T.blush}10`,border:`1.5px dashed ${T.blush}45`,fontSize:14,fontWeight:700,color:T.blush,cursor:"pointer"}}>
          + Add Transaction
        </button>
      )}

      {/* Add form */}
      {showForm&&(
        <TxnForm T={T} form={form} setForm={setForm}
          onSubmit={onAddTxn} onCancel={()=>setShowForm(false)}/>
      )}

      {/* Filters */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={descFilter} onChange={e=>setDescFilter(e.target.value)}
          placeholder="🔍 Search description…"
          style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1.5px solid ${T.div}`,background:"rgba(255,255,255,0.7)",fontSize:12,color:T.text,outline:"none"}}/>
        <div style={{display:"flex",gap:4}}>
          {[{v:"all",lbl:"All"},{v:"lc",lbl:"LC"},{v:"scu",lbl:"SCU"}].map(a=>(
            <button key={a.v} onClick={()=>setAcctFilter(a.v)}
              style={{padding:"7px 11px",borderRadius:9,border:`1.5px solid ${acctFilter===a.v?T.blush+"50":T.div}`,background:acctFilter===a.v?`${T.blush}14`:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:acctFilter===a.v?700:400,color:acctFilter===a.v?T.blush:T.lt,cursor:"pointer"}}>
              {a.lbl}
            </button>
          ))}
        </div>
      </div>

      {/* Transactions — grouped by month, newest first */}
      {grouped.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:T.lt,fontFamily:"'Cormorant Garamond',serif",fontSize:20}}>
          No transactions yet.<br/><span style={{fontSize:14,color:T.lt}}>Tap + Add Transaction to get started.</span>
        </div>
      )}

      {grouped.map(([monthKey,rows])=>{
        const d=new Date(monthKey+"-01");
        const label=d.toLocaleDateString("en-US",{month:"long",year:"numeric"});
        const monthDeposits=rows.reduce((s,t)=>s+(t.amount>0?t.amount:0),0);
        const monthWithdrawn=rows.reduce((s,t)=>s+(t.amount<0?t.amount:0),0);
        return(
          <div key={monthKey} style={{marginBottom:20}}>
            {/* Month header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:`${T.blush}12`,borderRadius:12,border:`1px solid ${T.blush}20`,marginBottom:8}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T.text}}>{label}</span>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:T.sage}}>+{fmtD(monthDeposits)}</div>
                <div style={{fontSize:10,color:T.danger}}>{fmtD(monthWithdrawn)}</div>
              </div>
            </div>

            {/* Transaction rows */}
            {[...rows].reverse().map(t=>{
              const isNeg=t.amount<0;
              const isEditing=editId===t.id;
              const acctCol=t.account==="lc"?T.lc:T.scu;
              const bal=t.account==="lc"?t.lcBal:t.scuBal;
              return(
                <div key={t.id} style={{marginBottom:6}}>
                  {isEditing&&editForm?(
                    <TxnForm T={T} form={editForm} setForm={setEditForm}
                      title="Edit Transaction"
                      onSubmit={()=>onEditSave({...editForm,amount:parseFloat(editForm.amount)||0})}
                      onCancel={()=>setEditId(null)}/>
                  ):(
                    <div style={{display:"flex",alignItems:"center",gap:8,background:T.card,borderRadius:12,padding:"10px 12px",border:`1px solid ${T.border}`,boxShadow:"0 1px 6px rgba(0,0,0,.04)"}}>
                      {/* Account dot */}
                      <div style={{width:8,height:8,borderRadius:"50%",background:acctCol,flexShrink:0}}/>
                      {/* Date */}
                      <div style={{fontSize:11,color:T.lt,flexShrink:0,minWidth:64}}>{fmtDate(t.date)}</div>
                      {/* Description */}
                      <div style={{flex:1,overflow:"hidden"}}>
                        <div style={{fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc}</div>
                        {t.note&&<div style={{fontSize:10,color:T.lt,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note}</div>}
                        <div style={{fontSize:9,color:acctCol,marginTop:1,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>{t.account==="lc"?"LC":"SCU"}</div>
                      </div>
                      {/* Amount + running balance */}
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:isNeg?T.danger:T.sage}}>{isNeg?"":"+"}{ new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(t.amount)}</div>
                        {bal!==null&&<div style={{fontSize:11,color:T.lt,marginTop:1}}>Bal: {fmtD(bal)}</div>}
                      </div>
                      {/* Edit / Delete */}
                      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                        <button onClick={()=>startEdit(t)} style={{fontSize:11,color:T.lt,background:"none",border:"none",cursor:"pointer",padding:"2px 4px"}}>✏️</button>
                        <button onClick={()=>onDelTxn(t.id)} style={{fontSize:11,color:T.danger,background:"none",border:"none",cursor:"pointer",padding:"2px 4px"}}>×</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── SETTINGS PAGE ────────────────────────────────────────────────
function Settings({T,lcStart,scuStart,onStartChange}){
  return(
    <div className="fade">
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:600,color:T.text,marginBottom:14}}>Settings</div>

      <div style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"18px 20px",border:`1px solid ${T.border}`,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:10,color:T.lt,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}}>Starting Balances</div>
        <div style={{fontSize:12,color:T.sub,marginBottom:16,lineHeight:1.6}}>Set the starting balances for each account. All transactions will calculate running balances from these starting points.</div>
        {[
          {key:"lc",lbl:"LC / Main Checking (X-Energy)",col:T.lc,val:lcStart},
          {key:"scu",lbl:"SCU Checking (TerraPower)",col:T.scu,val:scuStart},
        ].map(a=>(
          <div key={a.key} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:a.col}}/>
              <span style={{fontSize:13,fontWeight:600,color:T.text}}>{a.lbl}</span>
            </div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:18,color:a.col,fontFamily:"'Cormorant Garamond',serif",fontWeight:600}}>$</span>
              <input type="number" step="0.01" value={a.val}
                onChange={e=>onStartChange(a.key,e.target.value)}
                style={{width:"100%",padding:"10px 10px 10px 28px",borderRadius:12,border:`1.5px solid ${a.col}35`,background:`${a.col}0E`,fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:a.col,outline:"none",boxSizing:"border-box"}}/>
            </div>
          </div>
        ))}
      </div>

      <div style={{background:T.card,backdropFilter:"blur(12px)",borderRadius:18,padding:"16px 20px",border:`1px solid ${T.border}`,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:10,color:T.lt,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:10}}>How to Use</div>
        {[
          ["📒","Ledger tab","Add every transaction as it happens. Use − for withdrawals, + for deposits."],
          ["🔴🟢","Account dots","Red dot = LC Checking, Green dot = SCU Checking."],
          ["💰","Running balance","Each row shows the balance for that account after the transaction."],
          ["🔍","Filter","Search by description or filter by account using the buttons at the top."],
          ["✏️","Edit / Delete","Tap ✏️ to correct a transaction, × to remove it entirely."],
        ].map(([ico,title,desc],i)=>(
          <div key={i} style={{display:"flex",gap:10,marginBottom:i<4?12:0}}>
            <span style={{fontSize:18,flexShrink:0}}>{ico}</span>
            <div><div style={{fontSize:12,fontWeight:700,color:T.text}}>{title}</div><div style={{fontSize:11,color:T.lt,marginTop:2,lineHeight:1.5}}>{desc}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
